<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cosmic Particle Simulator | Interactive 3D Visual Experience</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Inter', 'Montserrat', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            background-color: #050510;
            color: white;
        }

        /* Canvas fills entire screen */
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* UI Overlay - elegant glassmorphism */
        .info-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(10, 10, 30, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 12px 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .info-panel h1 {
            font-size: 1.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #aaccff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 4px;
        }

        .info-panel p {
            font-size: 0.75rem;
            opacity: 0.8;
        }

        .stats {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 8px 16px;
            font-family: monospace;
            font-size: 0.8rem;
            text-align: right;
            border: 1px solid rgba(255,255,255,0.15);
            pointer-events: none;
        }

        .controls-tip {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 20;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: none;
            font-family: monospace;
        }

        /* interactive color effect for dynamic cursor (visual flair) */
        @keyframes subtlePulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        @media (max-width: 600px) {
            .info-panel { padding: 8px 16px; }
            .info-panel h1 { font-size: 1rem; }
            .stats { font-size: 0.65rem; }
        }
    </style>
</head>
<body>

    <div class="info-panel">
        <h1>✨ COSMIC PARTICLE SIMULATOR</h1>
        <p>interactive 3D particle field • dynamic colors • gravitational attraction</p>
    </div>
    <div class="stats">
        <span id="particleCount">0</span> particles<br>
        <span id="fps">—</span> fps
    </div>
    <div class="controls-tip">
        🖱️ MOUSE DRAG → rotate view • SCROLL → zoom
    </div>

    <!-- Include Three.js core and add-ons from CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --- setup scene, camera, renderer ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020218);
        scene.fog = new THREE.FogExp2(0x020218, 0.0006); // subtle depth fog

        // camera: perspective with wider FOV for immersive feel
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(25, 12, 35);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // --- post-processing bloom for glowing particles ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.3, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.9;
        bloomPass.radius = 0.8;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);

        // --- controls with smooth interaction and auto-rotate optional but we keep manual ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;          // smooth inertial movement
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 0.8;
        controls.zoomSpeed = 1.2;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.0;
        controls.enablePan = false;
        controls.autoRotate = false;
        controls.target.set(0, 0, 0);
        
        // --- starfield background (particle system distant stars) for extra depth ---
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 1800;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            // distribute in a large sphere radius 400-800
            const radius = 380 + Math.random() * 300;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPositions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
            starPositions[i*3+1] = radius * Math.sin(phi) * Math.sin(theta);
            starPositions[i*3+2] = radius * Math.cos(phi);
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.25,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending
        });
        const starsField = new THREE.Points(starGeometry, starMaterial);
        scene.add(starsField);
        
        // --- additional twinkling distant nebula effect using a second particle cloud ---
        const nebulaGeo = new THREE.BufferGeometry();
        const nebulaCount = 800;
        const nebulaPositions = new Float32Array(nebulaCount * 3);
        const nebulaColors = new Float32Array(nebulaCount * 3);
        for (let i = 0; i < nebulaCount; i++) {
            const rad = 150 + Math.random() * 200;
            const theta2 = Math.random() * Math.PI * 2;
            const phi2 = Math.acos(2 * Math.random() - 1);
            nebulaPositions[i*3] = rad * Math.sin(phi2) * Math.cos(theta2);
            nebulaPositions[i*3+1] = rad * Math.sin(phi2) * Math.sin(theta2) * 0.6; // flattened
            nebulaPositions[i*3+2] = rad * Math.cos(phi2);
            const colorHue = 0.55 + Math.random() * 0.3; // blue-purple range
            const colorObj = new THREE.Color().setHSL(colorHue, 0.9, 0.5);
            nebulaColors[i*3] = colorObj.r;
            nebulaColors[i*3+1] = colorObj.g;
            nebulaColors[i*3+2] = colorObj.b;
        }
        nebulaGeo.setAttribute('position', new THREE.BufferAttribute(nebulaPositions, 3));
        nebulaGeo.setAttribute('color', new THREE.BufferAttribute(nebulaColors, 3));
        const nebulaPoints = new THREE.Points(nebulaGeo, new THREE.PointsMaterial({ size: 0.18, vertexColors: true, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending }));
        scene.add(nebulaPoints);
        
        // --- MAIN INTERACTIVE PARTICLE SYSTEM (dynamic, physics-based) ---
        const PARTICLE_COUNT = 4500;
        // geometry with positions and colors
        const particleGeo = new THREE.BufferGeometry();
        
        // initial positions within a sphere radius 18
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const colorsArray = new Float32Array(PARTICLE_COUNT * 3);
        
        // store velocities for each particle (vector3)
        const velocities = [];
        // also store original random parameters for organic motion (attraction variation)
        const attractFactors = new Array(PARTICLE_COUNT);
        
        // colors: vibrant cosmic palette with cyan, magenta, gold, electric blue
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            // radial position: more density near center (cube root distribution)
            const r = Math.pow(Math.random(), 1.2) * 16;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta) * 0.8; // slight flattening
            const z = r * Math.cos(phi);
            positions[i*3] = x;
            positions[i*3+1] = y;
            positions[i*3+2] = z;
            
            // color: based on distance from center, angle, and randomness (gradient)
            const mixFactor = (r / 18);
            let rCol, gCol, bCol;
            if (Math.random() > 0.3) {
                // core hot colors (orange/pink to cyan)
                const t = (Math.sin(theta * 3) * 0.5 + 0.5) * 0.8 + mixFactor * 0.3;
                rCol = 0.8 + Math.random() * 0.3;
                gCol = 0.4 + Math.random() * 0.6;
                bCol = 0.7 + Math.random() * 0.3;
                if (Math.random() > 0.6) {
                    rCol = 0.3 + Math.random() * 0.5;
                    gCol = 0.6 + Math.random() * 0.4;
                    bCol = 1.0;
                }
            } else {
                // deep purple/blue outliers
                rCol = 0.3 + Math.random()*0.2;
                gCol = 0.2 + Math.random()*0.3;
                bCol = 0.8 + Math.random()*0.2;
            }
            // final tweak: vibrant
            colorsArray[i*3] = rCol;
            colorsArray[i*3+1] = gCol;
            colorsArray[i*3+2] = bCol;
            
            // velocity: small random initial drift
            velocities.push(new THREE.Vector3(
                (Math.random() - 0.5) * 0.8,
                (Math.random() - 0.5) * 0.8,
                (Math.random() - 0.5) * 0.8
            ));
            // each particle has unique attraction strength to center & noise factor
            attractFactors[i] = {
                centerStrength: 0.02 + Math.random() * 0.025,
                noiseAmp: 0.04 + Math.random() * 0.07,
                radiusInfluence: 0.7 + Math.random() * 0.6
            };
        }
        
        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particleGeo.setAttribute('color', new THREE.BufferAttribute(colorsArray, 3));
        
        // Custom shader-like material using PointsMaterial with vertexColors and additive blending for glow
        const particleMaterial = new THREE.PointsMaterial({
            size: 0.22,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            transparent: true,
            opacity: 0.95
        });
        
        const particleSystem = new THREE.Points(particleGeo, particleMaterial);
        scene.add(particleSystem);
        
        // --- central glowing orb (gravitational attractor visual) ---
        const coreGlowMat = new THREE.MeshStandardMaterial({
            color: 0xff66cc,
            emissive: 0xff22aa,
            emissiveIntensity: 0.8,
            metalness: 0.2,
            roughness: 0.3,
            transparent: true
        });
        const coreSphere = new THREE.Mesh(new THREE.SphereGeometry(1.1, 32, 32), coreGlowMat);
        scene.add(coreSphere);
        
        // Add an outer halo using ring of particles or a point light? let's add point light for dramatic shading
        const ambientLight = new THREE.AmbientLight(0x111122);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xff66cc, 1.2, 50);
        pointLight.position.set(2, 2, 3);
        scene.add(pointLight);
        const backLight = new THREE.PointLight(0x2266ff, 0.8);
        backLight.position.set(-3, -1, -4);
        scene.add(backLight);
        
        // additional floating tiny particles for sparkle effect (simple)
        const sparkleGeo = new THREE.BufferGeometry();
        const sparkleCount = 1200;
        const sparklePos = new Float32Array(sparkleCount * 3);
        for (let i=0; i<sparkleCount; i++) {
            sparklePos[i*3] = (Math.random() - 0.5) * 50;
            sparklePos[i*3+1] = (Math.random() - 0.5) * 30;
            sparklePos[i*3+2] = (Math.random() - 0.5) * 40;
        }
        sparkleGeo.setAttribute('position', new THREE.BufferAttribute(sparklePos, 3));
        const sparkleMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.06, transparent: true, blending: THREE.AdditiveBlending });
        const sparkles = new THREE.Points(sparkleGeo, sparkleMat);
        scene.add(sparkles);
        
        // --- dynamic time and FPS counter helpers ---
        let frameCount = 0;
        let lastTime = performance.now();
        const fpsElem = document.getElementById('fps');
        const particleCountElem = document.getElementById('particleCount');
        particleCountElem.innerText = PARTICLE_COUNT;
        
        // animation variables
        let timeAcc = 0;
        
        // Helper: smoothly update colors over time (small hue shifts) - creates breathing effect
        // we'll gradually shift color array for dynamic vibe (performs small updates each frame)
        function updateColorsOverTime(deltaTime) {
            // every 2 seconds, do minor color rotation on some particles, but not all each frame for performance.
            // Instead, we'll shift some random subset? But we want smooth transition: use time-based HSL shifting for 5% of particles per second.
            // For best performance, we modify colors array and set needsUpdate.
            const colorAttr = particleGeo.attributes.color;
            const colorsArrayLocal = colorAttr.array;
            const shiftAmount = deltaTime * 0.3; // subtle hue shift factor
            // only update a fraction of particles each frame to keep smooth (approx 200 per frame)
            const updatesPerFrame = Math.min(300, PARTICLE_COUNT);
            for (let i = 0; i < updatesPerFrame; i++) {
                const idx = Math.floor(Math.random() * PARTICLE_COUNT);
                const r = colorsArrayLocal[idx*3];
                const g = colorsArrayLocal[idx*3+1];
                const b = colorsArrayLocal[idx*3+2];
                // drift toward neighboring hue in RGB space via slight rotation
                let nr = r + (Math.sin(timeAcc + idx) * 0.008);
                let ng = g + (Math.cos(timeAcc * 0.7 + idx) * 0.008);
                let nb = b + (Math.sin(timeAcc * 1.3 + idx) * 0.008);
                // clamp and keep vibrant
                nr = Math.min(1.0, Math.max(0.4, nr));
                ng = Math.min(1.0, Math.max(0.3, ng));
                nb = Math.min(1.0, Math.max(0.5, nb));
                colorsArrayLocal[idx*3] = nr;
                colorsArrayLocal[idx*3+1] = ng;
                colorsArrayLocal[idx*3+2] = nb;
            }
            colorAttr.needsUpdate = true;
        }
        
        // central gravitational influence & dynamic motion
        function updateParticles(deltaTime) {
            const positionsAttr = particleGeo.attributes.position;
            const posArray = positionsAttr.array;
            // apply forces: central attraction + noise + mutual? but central yields orbital feel
            const center = new THREE.Vector3(0, 0, 0);
            // damping factor for stability
            const damping = 0.995;
            const delta = Math.min(deltaTime, 0.033) * 0.9; // speed factor
            
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const ix = i*3;
                const iy = i*3+1;
                const iz = i*3+2;
                const px = posArray[ix];
                const py = posArray[iy];
                const pz = posArray[iz];
                const vel = velocities[i];
                
                // vector to center
                const dx = -px;
                const dy = -py;
                const dz = -pz;
                const distSq = dx*dx + dy*dy + dz*dz + 0.5;
                const dist = Math.sqrt(distSq);
                // gravitational-like pull: force magnitude inversely proportional to distance but with smoothing
                const forceMag = attractFactors[i].centerStrength * (1.0 / (dist * 0.8 + 0.6));
                // direction normalized
                const dirX = dx / dist;
                const dirY = dy / dist;
                const dirZ = dz / dist;
                
                // add central pull
                vel.x += dirX * forceMag * delta * 2.2;
                vel.y += dirY * forceMag * delta * 1.8;
                vel.z += dirZ * forceMag * delta * 2.0;
                
                // add organic noise (subtle turbulence) based on sine of time & position
                const noise = attractFactors[i].noiseAmp;
                const t = timeAcc;
                vel.x += Math.sin(t * 1.7 + px * 0.9) * noise * delta * 0.8;
                vel.y += Math.cos(t * 1.3 + py * 1.1) * noise * delta * 0.8;
                vel.z += Math.sin(t * 2.1 + pz * 0.7) * noise * delta * 0.8;
                
                // apply damping to prevent explosion
                vel.x *= damping;
                vel.y *= damping;
                vel.z *= damping;
                
                // euler integration
                let newX = px + vel.x * delta * 1.2;
                let newY = py + vel.y * delta * 1.2;
                let newZ = pz + vel.z * delta * 1.2;
                
                // boundary: soft sphere radius 28: gentle bounce back or force push
                const boundRad = 27;
                const radSq = newX*newX + newY*newY + newZ*newZ;
                if (radSq > boundRad*boundRad) {
                    const outward = Math.sqrt(radSq);
                    const push = (outward - boundRad) * 0.12;
                    newX -= (newX / outward) * push;
                    newY -= (newY / outward) * push;
                    newZ -= (newZ / outward) * push;
                    // reduce velocity radial component
                    const normX = newX / outward;
                    const normY = newY / outward;
                    const normZ = newZ / outward;
                    const vdotn = vel.x*normX + vel.y*normY + vel.z*normZ;
                    if (vdotn > 0) {
                        vel.x -= vdotn * normX * 0.3;
                        vel.y -= vdotn * normY * 0.3;
                        vel.z -= vdotn * normZ * 0.3;
                    }
                }
                
                posArray[ix] = newX;
                posArray[iy] = newY;
                posArray[iz] = newZ;
            }
            positionsAttr.needsUpdate = true;
        }
        
        // rotation for stars background slight drift for ambient motion
        let starRotationSpeed = 0.0008;
        
        // Animate central orb pulse and lights
        let pulseDir = 0.01;
        let coreIntensity = 0.8;
        
        // FPS Tracking and render loop
        let lastTimestamp = performance.now();
        
        function animate() {
            const now = performance.now();
            let dt = Math.min(0.033, (now - lastTimestamp) / 1000);
            if (dt < 0.003) dt = 0.016;
            lastTimestamp = now;
            timeAcc += dt;
            
            // update particle physics
            updateParticles(dt);
            // update colors dynamically for living look
            updateColorsOverTime(dt);
            
            // animate central sphere pulsation & light intensity
            coreIntensity += pulseDir * dt * 1.5;
            if (coreIntensity > 1.1) pulseDir = -0.015;
            if (coreIntensity < 0.55) pulseDir = 0.015;
            coreGlowMat.emissiveIntensity = 0.6 + coreIntensity * 0.5;
            coreSphere.scale.setScalar(1 + Math.sin(timeAcc * 5) * 0.03);
            pointLight.intensity = 0.9 + Math.sin(timeAcc * 2.3) * 0.3;
            
            // rotate starfield and nebula for dreamy motion
            starsField.rotation.y += 0.0005;
            starsField.rotation.x += 0.0003;
            nebulaPoints.rotation.y -= 0.0002;
            sparkles.rotation.y += 0.0004;
            sparkles.rotation.x += 0.0002;
            
            // update controls & render via effect composer
            controls.update(); // for damping
            
            effectComposer.render();
            
            // update FPS counter every second
            frameCount++;
            const timeSince = performance.now() - lastTime;
            if (timeSince >= 1000) {
                const fps = Math.round((frameCount * 1000) / timeSince);
                fpsElem.innerText = fps;
                frameCount = 0;
                lastTime = performance.now();
            }
            
            requestAnimationFrame(animate);
        }
        
        // start simulation
        animate();
        
        // handle window resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // small console greeting
        console.log('✨ Cosmic Particle Simulator running | 4500 glowing particles with gravitational dynamics');
        
        // add a delicate halo effect via simple ring of points around core (decorative)
        const ringCount = 300;
        const ringGeo = new THREE.BufferGeometry();
        const ringPos = [];
        for (let i = 0; i < ringCount; i++) {
            const angle = (i / ringCount) * Math.PI * 2;
            const rad = 2.3;
            ringPos.push(Math.cos(angle) * rad, Math.sin(angle) * rad * 0.7, Math.sin(angle) * rad * 0.5);
        }
        ringGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(ringPos), 3));
        const ringPoints = new THREE.Points(ringGeo, new THREE.PointsMaterial({ color: 0xff88cc, size: 0.05, blending: THREE.AdditiveBlending }));
        scene.add(ringPoints);
        
        // small floating orbs around center for extra magic
        const orbCount = 40;
        const orbGroup = [];
        for (let i=0; i<orbCount; i++) {
            const orbGeo = new THREE.SphereGeometry(0.08, 8, 8);
            const orbMat = new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff4422, emissiveIntensity: 0.5 });
            const orbMesh = new THREE.Mesh(orbGeo, orbMat);
            const radOrb = 2.5 + Math.random() * 1.2;
            const ang = Math.random() * Math.PI * 2;
            const ang2 = Math.random() * Math.PI * 2;
            orbMesh.userData = { radius: radOrb, speed: 0.5 + Math.random() * 0.8, angle: ang, angleV: ang2, yOffset: (Math.random() - 0.5)*1.2 };
            scene.add(orbMesh);
            orbGroup.push(orbMesh);
        }
        
        function animateOrbs() {
            requestAnimationFrame(animateOrbs);
            const t = performance.now() / 1000;
            orbGroup.forEach(orb => {
                const data = orb.userData;
                if (data) {
                    const x = Math.cos(t * data.speed + data.angle) * data.radius;
                    const z = Math.sin(t * data.speed * 0.9 + data.angleV) * data.radius;
                    const y = Math.sin(t * data.speed * 1.2) * 0.8 + data.yOffset;
                    orb.position.set(x, y, z);
                }
            });
        }
        animateOrbs();
        
    </script>
</body>
</html>
